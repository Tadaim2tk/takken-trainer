延べ面積の3分の1を限度として、当該共同住宅の延べ面積に算入しない。", "answer": false, "mark": "×", "explanation": "共同住宅の共用の廊下及び階段部分は、容積率を算定する際の延べ面積に算入しない。「3分の1を限度として算入しない」のは、住宅等地下室の場合である。", "set": "Q&A", "id": 195}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定❽防火・準防火地域内の制限", "source": "Ｈ23－問18②改", "question": "防火地域内においては、3階建て、延べ面積が200㎡の住宅は耐火建築物、準耐火建築物又はこれらと同等以上の延焼防止性能が確保された建築物としなければならない。", "answer": false, "mark": "×", "explanation": "防火地域内においては、「3階建て以上」または「延べ面積が100㎡超」の建築物は耐火建築物（またはこれと同等以上の延焼防止性能が確保された建築物）にしなければならない。", "set": "Q&A", "id": 196}, {"book": "法令上の制限", "section": "建築基準法", "topic": "建築確認", "source": "Ｈ21－問18ア", "question": "準都市計画区域（都道府県知事が都道府県都市計画審議会の意見を聴いて指定する区域を除く。）内に建築する木造の建築物で、2の階数を有するものは、建築確認を必要としない。", "answer": false, "mark": "×", "explanation": "準都市計画区域では、「建築」の場合は建築確認が必要となる。", "set": "Q&A", "id": 197}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "許可・届出が不要な場合", "source": "Ｈ20－問17①改", "question": "宅地建物取引業者Aが所有する市街化区域内（無指定区域）の1,500㎡の土地について、宅地建物取引業者Bが購入する契約を締結した場合、Bは、その契約を締結した日から起算して2週間以内に事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "市街化区域については、2,000㎡未満の土地売買契約の締結には、届出が不要である。", "set": "Q&A", "id": 198}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "許可・届出が不要な場合", "source": "Ｈ24－問15②改", "question": "市街化調整区域（無指定区域）においてAが所有する面積4,000㎡の土地について、Bが一定の計画に従って、2,000㎡ずつに分割して順次購入した場合、Bは事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "市街化調整区域では、5,000㎡未満の土地売買契約の締結には、届出は不要である。", "set": "Q&A", "id": 199}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "許可・届出が不要な場合", "source": "R1－問22①", "question": "宅地建物取引業者Aが、自己の所有する市街化区域内の2,000㎡の土地を、個人B、個人Cに1,000㎡ずつに分割して売却した場合、B、Cは事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "市街化区域では、2,000㎡未満の土地売買契約の締結には、届出が不要なので、1,000㎡ずつ取得したBとCは事後届出を行う必要はない。", "set": "Q&A", "id": 200}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "事後届出の手続等", "source": "Ｈ22－問15④", "question": "事後届出に係る土地の利用目的について、丁県知事から勧告を受けた宅地建物取引業者Eが勧告に従わなかった場合、丁県知事は、その旨およびその勧告の内容を公表しなければならない。", "answer": false, "mark": "×", "explanation": "その旨および勧告の内容を公表することが「できる」のであって、必ず公表しなければならないものではない。", "set": "Q&A", "id": 201}, {"book": "法令上の制限", "section": "農地法", "topic": "農地法の全体像", "source": "Ｈ25－問21②", "question": "雑種地を開墾し、現に畑として耕作されている土地であっても、土地登記簿上の地目が雑種地である限り、農地法の適用を受ける農地には当たらない。", "answer": false, "mark": "×", "explanation": "現況が「畑」なら、土地登記簿上の地目にかかわらず、農地法上の農地となる。", "set": "Q&A", "id": 202}, {"book": "法令上の制限", "section": "農地法", "topic": "農地法の全体像", "source": "Ｈ22－問22②改", "question": "宅地に転用する目的で市街化区域外の農地を購入する場合は、農地の権利移動に係る農地法第3条第1項の許可のほか、農地転用に係る農地法第4条第1項の都道府県知事の許可を受ける必要がある。", "answer": false, "mark": "×", "explanation": "「使用する人の変更（所有者→購入者）」＆「使用方法の変更（農地→宅地）」なので、本問の場合は5条許可を受ける必要がある。", "set": "Q&A", "id": 203}, {"book": "法令上の制限", "section": "農地法", "topic": "条、４条、５条の規制のポイント", "source": "Ｈ21－問22③", "question": "市街化区域内において2ha（ヘクタール）の農地を住宅建設のために取得する者は、農地法第5条第1項の都道府県知事の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "市街化区域内の農地を転用目的で権利取得する場合は、あらかじめ農業委員会に届出をすれば、5条許可は不要となる。", "set": "Q&A", "id": 204}, {"book": "法令上の制限", "section": "農地法", "topic": "条、４条、５条の規制のポイント", "source": "Ｈ18－問25④", "question": "農業者が、自ら農業用倉庫として利用する目的で自己の所有する農地を転用する場合には、転用する農地の面積にかかわらず、農地法第4条第1項の許可を受ける必要がある。", "answer": false, "mark": "×", "explanation": "この場合、面積が2a未満であれば4条許可は不要となるが、面積が2a以上であれば4条許可が必要となる。", "set": "Q&A", "id": 205}, {"book": "法令上の制限", "section": "盛土規制法", "topic": "盛土規制法の全体像", "source": "H21－問20②改", "question": "宅地造成等工事規制区域内において、切土であって、当該切土をする土地の面積が400㎡で、かつ、高さ１ｍの崖を生ずることとなるものに関する工事を行う場合には、宅地造成等に伴う災害の発生のおそれがないと認められるものとして政令で定める工事を除き、都道府県知事の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "切土によって生じた崖が2m以下で、切土をする土地の面積が500㎡以下なので、宅地造成・特定盛土等に該当しない。したがって、都道府県知事の許可は不要である。", "set": "Q&A", "id": 206}, {"book": "法令上の制限", "section": "盛土規制法", "topic": "工事等の届出", "source": "Ｈ22－問20③改", "question": "宅地造成等工事規制区域内の土地において、地表水等を排除するための排水施設の除却の工事を行おうとする者は、宅地造成等に関する工事の許可を受けた場合を除き、工事に着手する日までに、その旨を都道府県知事に届け出なければならない。", "answer": false, "mark": "×", "explanation": "「工事に着手する日まで」ではなく、「工事に着手する日の14日前まで」である。", "set": "Q&A", "id": 207}, {"book": "法令上の制限", "section": "盛土規制法", "topic": "造成宅地防災区域", "source": "Ｈ24－問20④改", "question": "都道府県知事は、関係市町村長の意見を聴いて、宅地造成等工事規制区域内で、宅地造成に伴う災害で相当数の居住者等に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって一定の基準に該当するものを、造成宅地防災区域として指定することができる。", "answer": false, "mark": "×", "explanation": "造成宅地防災区域は、宅地造成等工事規制区域以外の区域に指定される。", "set": "Q&A", "id": 208}, {"book": "法令上の制限", "section": "土地区画整理法", "topic": "土地区画整理法の全体像", "source": "Ｈ19－問24①", "question": "土地区画整理組合を設立しようとする者は、事業計画の決定に先立って組合を設立する必要があると認める場合においては、5人以上共同して、定款及び事業基本方針を定め、その組合の設立について都道府県知事の認可を受けることができる。", "answer": false, "mark": "×", "explanation": "「5人以上」ではなく、「7人以上」である。", "set": "Q&A", "id": 209}, {"book": "法令上の制限", "section": "土地区画整理法", "topic": "建築行為等の制限", "source": "R4－問20①", "question": "土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物の新築を行おうとする者は、土地区画整理組合の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "「土地区画整理組合の許可」ではなく、「都道府県知事等の許可」である。", "set": "Q&A", "id": 210}, {"book": "法令上の制限", "section": "土地区画整理法", "topic": "換地処分", "source": "Ｈ21－問21④", "question": "換地処分の公告があった場合においては、換地計画において定められた換地は、その公告があった日の翌日から従前の宅地とみなされ、換地計画において換地を定めなかった従前の宅地について存する権利は、その公告があった日が終了した時において消滅する。", "answer": true, "mark": "〇", "explanation": "換地計画において定められた換地は換地処分の公告があった日の翌日から従前の宅地とみなされる。換地計画において換地を定めなかった従前の宅地について存する権利は換地処分の公告があった日が終了した時に消滅する。", "set": "Q&A", "id": 211}, {"book": "法令上の制限", "section": "都市計画法", "topic": "区域区分", "source": "", "question": "準都市計画区域については、無秩序な市街化を防止し、計画的な市街化を図るため、都市計画に市街化区域と市街化調整区域との区分を定めなければならない。", "answer": false, "mark": "×", "explanation": "準都市計画区域については、区域区分を定めることができない。", "set": "一問一答", "id": 212}, {"book": "法令上の制限", "section": "都市計画法", "topic": "地域地区", "source": "", "question": "高度利用地区は、用途地域内において市街地の環境を維持し、または土地利用の増進を図るため、建築物の高さの最高限度または最低限度を定める地区である。", "answer": false, "mark": "×", "explanation": "高度利用地区は、用途地域内の市街地における土地の合理的かつ健全な高度利用と都市機能の更新を図るため、①容積率の最高限度・最低限度、②建蔽率の最高限度、③建築面積の最低限度、④壁面の位置の制限を定める地区をいう。本問の内容は高度地区に関するものである。", "set": "一問一答", "id": 213}, {"book": "法令上の制限", "section": "都市計画法", "topic": "都市計画の決定手続", "source": "", "question": "市町村が定めた都市計画が、都道府県が定めた都市計画と抵触するときは、その限りにおいて、市町村が定めた都市計画が優先する。", "answer": false, "mark": "×", "explanation": "市町村が定めた都市計画が、都道府県が定めた都市計画と抵触するときは、その限りにおいて、「市町村」ではなく「都道府県」が定めた都市計画が優先する。", "set": "一問一答", "id": 214}, {"book": "法令上の制限", "section": "都市計画法", "topic": "開発許可①全体像", "source": "", "question": "区域区分の定めのない都市計画区域内において、遊園地の建設の用に供する目的で3,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "ゴルフコース以外の１ha（10,000㎡）未満の運動・レジャー施設（野球場や遊園地など）は、第二種特定工作物に該当しないため、本問の場合、開発許可は不要である。", "set": "一問一答", "id": 215}, {"book": "法令上の制限", "section": "都市計画法", "topic": "開発許可①全体像", "source": "", "question": "市街化調整区域において、医療法に規定する病院の建築を目的とした1,000㎡の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。", "answer": false, "mark": "×", "explanation": "「病院」は、開発許可が不要となる公益上必要な建築物に該当しない。また、市街化調整区域では、規模にかからわず開発許可が必要である。したがって、本問の場合、都道府県知事の許可が必要である。", "set": "一問一答", "id": 216}, {"book": "法令上の制限", "section": "都市計画法", "topic": "開発許可①全体像", "source": "", "question": "都市計画区域および準都市計画区域外の区域内において、変電所の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "「変電所」は、開発許可が不要となる公益上必要な建築物に該当する。したがって、開発行為を行う場所、規模にかかわらず、都道府県知事の許可は不要である。", "set": "一問一答", "id": 217}, {"book": "法令上の制限", "section": "都市計画法", "topic": "開発許可②開発許可の手続の流れ", "source": "", "question": "開発許可を申請しようとする者は、あらかじめ、開発行為に関係がある公共施設の管理者と協議しなければならないが、常にその同意を得ることを求められるものではない。", "answer": false, "mark": "×", "explanation": "開発許可を申請しようとする者は、あらかじめ、開発行為に関係がある公共施設の管理者と協議し、その同意を得る必要がある。", "set": "一問一答", "id": 218}, {"book": "法令上の制限", "section": "都市計画法", "topic": "開発許可④建築行為の制限", "source": "", "question": "開発許可を受けた開発区域内において、当該開発区域内の土地について用途地域等が定められていないとき、都道府県知事に届け出れば、開発行為に関する工事完了の公告があった後、当該開発許可に係る予定建築物以外の建築物を建築することができる。", "answer": false, "mark": "×", "explanation": "開発許可を受けた開発区域内では、工事完了の公告があった後は、原則として開発許可申請書に記載した予定建築物等以外のものは建築等ができない。ただし、①都道府県知事が許可したとき、②開発区域内の土地について用途地域等が定められているときは、予定建築物等以外のものでも建築等ができる。本問の「用途地域等が定められていないとき」は、都道府県知事に「届出」ではなく、「許可」を受けなければ、予定建築物等以外のも", "set": "一問一答", "id": 219}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定③建蔽率", "source": "", "question": "防火地域（建蔽率の限度が10分の８とされている地域に限る。）内にある耐火建築物については建蔽率の限度が10分の９に緩和される。", "answer": false, "mark": "×", "explanation": "建蔽率の限度が10分の8とされている地域で、かつ防火地域内にある耐火建築物（これと同等以上の延焼防止性能を有するものとして政令で定める建築物を含む）については、建蔽率の制限は適用されず、建蔽率100%で建築することができる。", "set": "一問一答", "id": 220}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定④容積率", "source": "", "question": "前面道路の幅員による容積率制限は、前面道路の幅員が12ｍ以上である場合は適用されない。", "answer": true, "mark": "〇", "explanation": "前面道路の幅員が12m未満の場合には、容積率に制限（前面道路の幅員による容積率制限）があるが、12m以上である場合には前面道路の幅員による容積率制限は適用されない。", "set": "一問一答", "id": 221}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定⑥高さ制限（斜線制限、日影規制）", "source": "", "question": "第二種中高層住居専用地域内における建築物については、建築基準法第56条第１項第３号の規定による北側斜線制限は適用されない。", "answer": false, "mark": "×", "explanation": "北側斜線制限は、第一種・第二種低層住居専用地域、田園住居地域、日影規制のない第一種・第二種中高層住居専用地域において適用される。", "set": "一問一答", "id": 222}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定⑦低層住居専用地域等内の制限", "source": "", "question": "第一種低層住居専用地域、第二種低層住居専用地域または田園住居地域内においては、建築物の高さは、12mまたは15mのうち、当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。", "answer": false, "mark": "×", "explanation": "第一種・第二種低層住居専用地域、田園住居地域内においては、建築物の高さは、原則として10mまたは12mのうち、都市計画において定められた建築物の高さの限度を超えてはならない。", "set": "一問一答", "id": 223}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定⑦低層住居専用地域等内の制限", "source": "", "question": "第二種低層住居専用地域内の土地においては、都市計画において建築物の外壁またはこれに代わる柱の面から敷地境界線までの距離の限度を２mまたは1.5mとして定めることができる。", "answer": false, "mark": "×", "explanation": "第一種・第二種低層住居専用地域、田園住居地域内においては、都市計画において外壁の後退距離の限度を定めるときは、その限度は1.5mまたは１mとされる。", "set": "一問一答", "id": 224}, {"book": "法令上の制限", "section": "建築基準法", "topic": "集団規定⑧防火・準防火地域内の制限", "source": "", "question": "準防火地域内においては、延べ面積が2,000㎡の共同住宅は準耐火建築物としなければならない。", "answer": false, "mark": "×", "explanation": "準防火地域内においては、「４階建て以上」または「延べ面積が1,500㎡超」の建築物は耐火建築物（またはこれと同等以上の延焼防止性能が確保された建築物）にしなければならない。", "set": "一問一答", "id": 225}, {"book": "法令上の制限", "section": "建築基準法", "topic": "建築確認", "source": "", "question": "事務所の用途に供する建築物を、飲食店（その床面積の合計250㎡）に用途変更する場合、建築主事もしくは建築副主事または指定確認検査機関の確認を受けなければならない。", "answer": true, "mark": "〇", "explanation": "飲食店は特殊建築物に該当する。したがって、事務所から飲食店への用途変更をする場合で、その床面積が200㎡超の場合には、建築確認を受ける必要がある。", "set": "一問一答", "id": 226}, {"book": "法令上の制限", "section": "建築基準法", "topic": "建築協定", "source": "", "question": "建築協定区域内の土地の所有者等は、特定行政庁から認可を受けた建築協定を変更または廃止しようとする場合においては、土地所有者等の過半数の合意をもってその旨を定め、特定行政庁の認可を受けなければならない。", "answer": false, "mark": "×", "explanation": "建築協定区域内の土地の所有者等（建築協定の効力が及ばない者を除く。以下同じ）は、特定行政庁から認可を受けた建築協定を「変更」しようとする場合は、その全員の合意をもってその旨を定め、特定行政庁の認可を受けなければならない。また当該建築協定を「廃止」しようとする場合においては、土地所有者等の過半数の合意をもってその旨を定め、特定行政庁の認可を受けなければならない。", "set": "一問一答", "id": 227}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "国土利用計画法の全体像", "source": "", "question": "市街化区域内の土地（面積2,500㎡）を購入する契約を締結した者は、その契約を締結した日から起算して３週間以内に事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "事後届出は、契約を締結した日から起算して２週間以内に行わなければならない。", "set": "一問一答", "id": 228}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "土地売買等の契約とは", "source": "", "question": "個人Ｄが所有する市街化区域内の3,000㎡の土地を、個人Ｅが相続により取得した場合、Ｅは事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "相続による土地の取得は、土地売買等の契約に該当しないため、事後届出は不要である。", "set": "一問一答", "id": 229}, {"book": "法令上の制限", "section": "国土利用計画法", "topic": "許可・届出が不要な場合", "source": "", "question": "甲市が所有する市街化調整区域内の12,000㎡の土地を、宅地建物取引業者Ｈが購入した場合、Ｈは事後届出を行わなければならない。", "answer": false, "mark": "×", "explanation": "当事者の一方または双方が、国、地方公共団体、地方住宅供給公社等である場合は許可や届出は不要である。", "set": "一問一答", "id": 230}, {"book": "法令上の制限", "section": "農地法", "topic": "条、４条、５条の規制のポイント", "source": "", "question": "農業者が相続により取得した市街化調整区域内の農地を自己の住宅用地として転用する場合でも、農地法第４条第１項の許可を受ける必要がある。", "answer": true, "mark": "〇", "explanation": "相続によって農地を取得した場合には、３条許可は不要であるが、農地を住宅用地として転用する場合には４条許可が必要である。", "set": "一問一答", "id": 231}, {"book": "法令上の制限", "section": "農地法", "topic": "条、４条、５条の規制のポイント", "source": "", "question": "市街化区域内の農地を耕作目的で取得する場合には、あらかじめ農業委員会に届け出れば、農地法第３条第１項の許可を受ける必要はない。", "answer": false, "mark": "×", "explanation": "市街化区域内の農地や採草放牧地を転用または転用目的で取得する場合には、あらかじめ農業委員会に届け出れば４条許可または５条許可は不要であるが、権利移動の場合（本問の場合）には、３条許可が必要である。", "set": "一問一答", "id": 232}, {"book": "法令上の制限", "section": "盛土規制法", "topic": "盛土規制法の全体像", "source": "", "question": "宅地造成等工事規制区域内において行われる盛土であって、当該盛土をする土地の面積が300㎡で、かつ、高さ1.5mの崖を生ずることとなるものに関する工事については、原則として都道府県知事の許可が必要である。", "answer": true, "mark": "〇", "explanation": "盛土で高さ１m超の崖を生ずる場合には、原則として都道府県知事の許可が必要である。", "set": "一問一答", "id": 233}, {"book": "法令上の制限", "section": "盛土規制法", "topic": "工事等の届出", "source": "", "question": "宅地造成等工事規制区域の指定の際に、当該宅地造成等工事規制区域内において宅地造成等に関する工事を行っている者は、当該工事について改めて都道府県知事の許可を受けなければならない。", "answer": false, "mark": "×", "explanation": "宅地造成等工事規制区域の指定の際に、当該宅地造成等工事規制区域内において宅地造成等に関する工事を行っている者は、宅地造成等工事規制区域の指定があった日から21日以内に当該工事について「届出」が必要であるが、当該工事について「改めて都道府県知事の許可」を受ける必要はない。", "set": "一問一答", "id": 234}, {"book": "法令上の制限", "section": "土地区画整理法", "topic": "土地区画整理法の全体像", "source": "", "question": "土地区画整理組合が施行する土地区画整理事業に係る施行地区内の宅地について借地権のみを有する者は、その組合の組合員とはならない。", "answer": false, "mark": "×", "explanation": "施行地区内の宅地の所有者、借地権者は全員、組合員となる（強制加入）。", "set": "一問一答", "id": 235}, {"book": "法令上の制限", "section": "土地区画整理法", "topic": "仮換地", "source": "", "question": "仮換地が指定された場合において、従前の宅地について権原にもとづき使用し、または収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地について、従前の宅地について有する権利の内容である使用または収益と同じ使用または収益をすることができる。", "answer": true, "mark": "〇", "explanation": "仮換地が指定された場合、従前の宅地について権原にもとづき使用・収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地について、従前の宅地について有する権利の内容である使用・収益と同じ使用・収益をすることができる。", "set": "一問一答", "id": 236}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金❶不動産取得税", "source": "Ｈ24－問24②改", "question": "2026年（令和8年）4月に取得した床面積250㎡である新築住宅に係る不動産取得税の課税標準の算定については、当該新築住宅の価格から1,200万円が控除される。", "answer": false, "mark": "×", "explanation": "課税標準から1,200万円を控除できるのは、床面積が50㎡以上240㎡以下の新築住宅を取得した場合である。", "set": "Q&A", "id": 237}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金❷登録免許税", "source": "Ｈ21－問23①改", "question": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置の適用対象となる住宅用家屋は、床面積が100㎡以上で、その住宅用家屋を取得した個人の用に供されるものに限られる。", "answer": false, "mark": "×", "explanation": "「100㎡以上」ではなく、「50㎡以上」である。", "set": "Q&A", "id": 238}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金❷登録免許税", "source": "R2（12月）－問23②改", "question": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置は、住宅用家屋を相続により取得した場合に受ける所有権の移転登記についても適用される。", "answer": false, "mark": "×", "explanation": "所有権移転登記については、取得原因が売買または競落の場合に限って軽減措置の特例を受けることができる。", "set": "Q&A", "id": 239}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金❸印紙税", "source": "Ｈ23－問23④", "question": "「Aの所有する土地（価額7,000万円）とBの所有する土地（価額1億円）とを交換し、AはBに差額3,000万円を支払う」旨を記載した土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は3,000万円である。", "answer": false, "mark": "×", "explanation": "交換契約書において、双方の金額が記載されている場合には、いずれか高いほう（本問の場合は1億円）が記載金額となる。", "set": "Q&A", "id": 240}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金❸印紙税", "source": "Ｈ21－問24②", "question": "「時価3,000万円の土地を無償で譲渡する」旨を記載した贈与契約書は、記載金額3,000万円の不動産の譲渡に関する契約書として印紙税が課される。", "answer": false, "mark": "×", "explanation": "贈与契約書は、「記載金額のない契約書」として、印紙税200円が課される。", "set": "Q&A", "id": 241}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を売却したときにかかる税金所得税（譲渡所得）", "source": "Ｈ24－問23①改", "question": "当年の1月1日において所有期間が10年以下の居住用財産を譲渡した場合、居住用財産の譲渡所得の3,000万円特別控除（租税特別措置法第35条第1項）を適用することができない。", "answer": false, "mark": "×", "explanation": "居住用財産の3,000万円の特別控除は所有期間の要件はない（短期でも長期でも適用できる）。", "set": "Q&A", "id": 242}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を売却したときにかかる税金所得税（譲渡所得）", "source": "Ｈ24－問23②改", "question": "当年の1月1日において所有期間が10年を超える居住用財産について、収用交換等の場合の譲渡所得等の5,000万円特別控除（租税特別措置法第33条の4第1項）の適用を受ける場合であっても、特別控除後の譲渡益について、居住用財産を譲渡した場合の軽減税率の特例（同法第31条の3第1項）を適用することができる。", "answer": true, "mark": "〇", "explanation": "収用等の5,000万円の特別控除と軽減税率は併用できる。", "set": "Q&A", "id": 243}, {"book": "税・その他", "section": "不動産鑑定評価基準", "topic": "不動産の鑑定評価方式", "source": "Ｈ19－問29④", "questio , "topic": "不動産の表示に関する公正競争規約", "source": "Ｈ25－問47④", "question": "完成後8か月しか経過していない分譲住宅については、入居の有無にかかわらず新築分譲住宅と表示してもよい。", "answer": false, "mark": "×", "explanation": "新築後1年未満であっても居住の用に供された建物は「新築」と表示することはできない。", "set": "Q&A", "id": 251}, {"book": "税・その他", "section": "土地・建物", "topic": "土地", "source": "Ｈ23－問49④", "question": "埋立地は一般に海面に対して数mの比高を持ち、干拓地より災害に対して危険である。", "answer": false, "mark": "×", "explanation": "埋立地は、海面より高くなるので、干拓地よりは安全と考えられる。", "set": "Q&A", "id": 252}, {"book": "税・その他", "section": "土地・建物", "topic": "土地", "source": "Ｈ22－問49①", "question": "地すべり地の多くは、地すべり地形と呼ばれる独特の地形を呈し、棚田などの水田として利用されることがある。", "answer": true, "mark": "〇", "explanation": "地すべり地の多くは棚田等の水田として利用される。", "set": "Q&A", "id": 253}, {"book": "税・その他", "section": "土地・建物", "topic": "建物", "source": "Ｈ18－問49④", "question": "はり、けたその他の横架材の中央部付近の下側に耐力上支障のある欠込みをする場合は、その部分を補強しなければならない。", "answer": false, "mark": "×", "explanation": "はり、けた等の横架材の中央部付近の下側に耐力上支障のある欠込みはしてはならない。", "set": "Q&A", "id": 254}, {"book": "税・その他", "section": "土地・建物", "topic": "建物", "source": "Ｈ22－問50②", "question": "コンクリートの引張強度は、圧縮強度より大きい。", "answer": false, "mark": "×", "explanation": "引張強度は圧縮強度より小さい。", "set": "Q&A", "id": 255}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金①不動産取得税", "source": "", "question": "不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合にも、不動産取得税は課される。", "answer": false, "mark": "×", "explanation": "法人の合併により不動産を取得した場合、不動産取得税は課されない。", "set": "一問一答", "id": 256}, {"book": "税・その他", "section": "不動産に関する税金", "topic": "不動産を取得したときにかかる税金③印紙税", "source": "", "question": "売上代金に係る金銭の受取書（領収書）は記載された受取金額が３万円未満の場合、印紙税が課されないことから、不動産売買の仲介手数料として、現金49,500円（消費税及び地方消費税を含む。）を受け取り、それを受領した旨の領収書を作成した場合、受取金額に応じた印紙税が課される。", "answer": false, "mark": "×", "explanation": "記載金額が５万円未満の受取書は、印紙税が課されない。", "set": "一問一答", "id": 257}, {"book": "税・その他", "section": "不動産鑑定評価基準", "topic": "不動産の鑑定評価方式", "source": "", "question": "収益還元法は、賃貸用不動産または賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効な手法であるが、事業の用に供さない自用の不動産の鑑定評価には適用すべきではない。", "answer": false, "mark": "×", "explanation": "収益還元法は、賃貸用不動産または賃貸以外の事業用不動産の価格を求めるときに特に有効である。また、一般的に市場性のない不動産以外のものには基本的にすべて適用すべきもので、自用の不動産であっても、賃貸を想定することにより適用されるものである。", "set": "一問一答", "id": 258}, {"book": "税・その他", "section": "地価公示法", "topic": "地価公示の手続", "source": "", "question": "都市計画区域外の区域を公示区域とすることはできない。", "answer": false, "mark": "×", "explanation": "公示区域とは、都市計画区域その他の区域で、土地取引が相当程度見込まれるものとして国土交通大臣が定める区域をいう。したがって、都市計画区域外の区域を公示区域とすることもある。", "set": "一問一答", "id": 259}, {"book": "税・その他", "section": "景品表示法", "topic": "不動産の表示に関する公正競争規約", "source": "", "question": "インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなったとしても、消費者からの問い合わせに対しすでに契約済みであり取引できない旨を説明すれば、その時点で消費者の誤認は払拭されるため、不当表示に問われることはない。", "answer": false, "mark": "×", "explanation": "本問の場合、「物件は存在するが、実際には取引の対象となり得ない物件の関する表示」としておとり広告に該当し、不当表示に問われる可能性がある。", "set": "一問一答", "id": 260}];

<script>
const Q = window.QUESTIONS || [];
const BOOKS = ["宅建業法","権利関係","法令上の制限","税・その他"];
const PKEY = "takken_progress_v1";
const SKEY = "takken_settings_v1";

let prog = load(PKEY, {});      // id -> {seen,correct,wrong,known,last}
let settings = load(SKEY, {book:"all", set:"all", filter:"all", order:"seq"});
if(!settings.set) settings.set="all";
let session = null;             // current run state

function load(k,def){ try{return JSON.parse(localStorage.getItem(k))||def;}catch(e){return def;} }
function save(){ localStorage.setItem(PKEY, JSON.stringify(prog)); }
function saveSettings(){ localStorage.setItem(SKEY, JSON.stringify(settings)); }
function rec(id){ return prog[id] || (prog[id]={seen:0,correct:0,wrong:0,known:false,last:null}); }

/* ---------- pool building ---------- */
function pool(){
  let list = Q.slice();
  if(settings.book!=="all") list = list.filter(q=>q.book===settings.book);
  if(settings.set!=="all") list = list.filter(q=>q.set===settings.set);
  if(settings.filter==="weak") list = list.filter(q=>{const r=prog[q.id]; return r && r.wrong>0 && r.last===false;});
  else if(settings.filter==="unseen") list = list.filter(q=>!prog[q.id]||prog[q.id].seen===0);
  else if(settings.filter==="notknown") list = list.filter(q=>!prog[q.id]||!prog[q.id].known);
  if(settings.order==="shuffle"){ for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];} }
  return list;
}

/* ---------- home dashboard ---------- */
function renderHome(){
  document.getElementById("totalQ").textContent = Q.length;
  let answered=0,correct=0,wrongTot=0,known=0,weak=0;
  Q.forEach(q=>{const r=prog[q.id]; if(!r)return;
    if(r.seen>0)answered++; correct+=r.correct; wrongTot+=r.wrong;
    if(r.known)known++; if(r.wrong>0&&r.last===false)weak++;});
  document.getElementById("stAnswered").textContent=answered;
  const tot=correct+wrongTot;
  document.getElementById("stAcc").textContent = tot? Math.round(correct/tot*100)+"%" : "–";
  document.getElementById("stKnown").textContent=known;
  document.getElementById("stWeak").textContent=weak;

  // per book
  const bc=document.getElementById("bookStats"); bc.innerHTML="";
  BOOKS.forEach(b=>{
    const qs=Q.filter(q=>q.book===b); if(!qs.length)return;
    let seen=0,c=0,w=0; qs.forEach(q=>{const r=prog[q.id]; if(r){if(r.seen>0)seen++;c+=r.correct;w+=r.wrong;}});
    const pct = qs.length? Math.round(seen/qs.length*100):0;
    const acc = (c+w)? Math.round(c/(c+w)*100):null;
    const div=document.createElement("div");
    div.innerHTML=`<div class="bookline"><b>${b}</b><span class="small">${seen}/${qs.length}問 学習${acc!==null?" ・ 正答"+acc+"%":""}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>`;
    bc.appendChild(div);
  });

  // chips
  chipRow("bookChips", [["all","すべて"]].concat(BOOKS.map(b=>[b,b])), settings.book, v=>{settings.book=v;saveSettings();renderHome();});
  chipRow("setChips", [["all","両方"],["Q&A","Q&A集"],["一問一答","一問一答集"]], settings.set, v=>{settings.set=v;saveSettings();renderHome();});
  chipRow("filterChips", [["all","全問"],["notknown","未マスター"],["unseen","未回答のみ"],["weak","苦手のみ"]], settings.filter, v=>{settings.filter=v;saveSettings();renderHome();});
  chipRow("orderChips", [["seq","順番"],["shuffle","シャッフル"]], settings.order, v=>{settings.order=v;saveSettings();renderHome();});

  const n=pool().length;
  document.getElementById("poolInfo").innerHTML = `この条件の対象：<b style="color:var(--ink)">${n}問</b>` + (n===0?"　該当なし。条件を変えてください。":"");
}
function chipRow(id, opts, cur, cb){
  const el=document.getElementById(id); el.innerHTML="";
  opts.forEach(([v,l])=>{
    const b=document.createElement("button");
    b.className="chip"+(v===cur?" on":""); b.textContent=l;
    b.onclick=()=>cb(v); el.appendChild(b);
  });
}

/* ---------- view switch ---------- */
function show(id){ ["home","quiz","flash"].forEach(v=>document.getElementById(v).classList.toggle("hide",v!==id));
  document.getElementById("quizFoot").classList.toggle("hide",id!=="quiz");
  document.getElementById("flashFoot").classList.toggle("hide",id!=="flash");
  window.scrollTo(0,0);
}
function goHome(){ renderHome(); show("home"); }

/* ---------- quiz mode ---------- */
function startQuiz(){
  const list=pool(); if(!list.length){alert("対象の問題がありません。条件を変えてください。");return;}
  session={list,i:0,right:0,wrong:0};
  show("quiz"); renderQ();
}
function renderQ(){
  const s=session,q=s.list[s.i];
  document.getElementById("qprog").style.width=(s.i/s.list.length*100)+"%";
  document.getElementById("qcounter").textContent=`${s.i+1} / ${s.list.length}　（正解 ${s.right} ・ 不正解 ${s.wrong}）`;
  const r=prog[q.id];
  document.getElementById("qmeta").innerHTML =
    `<span class="tag">${q.book}</span>`+(q.section?`<span class="tag">${q.section}</span>`:"")+
    (q.topic?`<span class="tag">${q.topic}</span>`:"")+(q.source?`<span class="tag">${q.source}</span>`:"")+
    (q.set?`<span class="tag">${q.set}</span>`:"")+
    (r&&r.known?`<span class="pill known">覚えた</span>`:"");
  document.getElementById("qtext").textContent=q.question;
  document.getElementById("oxbtns").classList.remove("hide");
  document.getElementById("verdict").classList.add("hide");
  document.getElementById("nextBtn").classList.add("hide");
}
function answer(user){
  const s=session,q=s.list[s.i],r=rec(q.id);
  const ok = (user===q.answer);
  r.seen++; r.last=ok; if(ok){r.correct++;s.right++;}else{r.wrong++;s.wrong++;} save();
  document.getElementById("oxbtns").classList.add("hide");
  const v=document.getElementById("verdict"); v.classList.remove("hide");
  const correctMark = q.answer? "◯（正しい）":"✕（誤り）";
  v.innerHTML =
    `<div class="vhead ${ok?'ok':'ng'}">${ok?'正解！':'不正解'} <span class="ansmark">${q.answer?'◯':'✕'}</span></div>
     <div class="small" style="margin-top:4px">正答：${correctMark}</div>
     <div class="expl"><span class="lab">解説</span>${q.explanation||"（解説なし）"}</div>`;
  document.getElementById("nextBtn").classList.remove("hide");
  document.getElementById("nextBtn").textContent = (s.i+1>=s.list.length)?"結果を見る":"次へ →";
}
function nextQ(){
  const s=session; s.i++;
  if(s.i>=s.list.length){ finishQuiz(); return; }
  renderQ();
}
function finishQuiz(){
  const s=session;const tot=s.right+s.wrong;const acc=tot?Math.round(s.right/tot*100):0;
  document.getElementById("qprog").style.width="100%";
  document.querySelector("#quiz .card").classList.add("hide");
  const d=document.getElementById("quizDone"); d.classList.remove("hide");
  d.innerHTML=`<div class="card center">
    <div style="font-size:22px;font-weight:800">おつかれさまでした</div>
    <div class="grid" style="margin-top:14px">
      <div class="stat"><div class="n">${s.right}</div><div class="l">正解</div></div>
      <div class="stat"><div class="n">${s.wrong}</div><div class="l">不正解</div></div>
    </div>
    <div style="font-size:34px;font-weight:900;margin-top:14px;color:${acc>=70?'var(--good)':'var(--warn)'}">${acc}%</div>
    <div class="row" style="margin-top:18px">
      <button class="btn primary" style="flex:1" onclick="restartQuiz()">もう一度</button>
      <button class="btn" style="flex:1" onclick="goHome()">ホームへ</button>
    </div>
    ${s.wrong>0?`<button class="btn sm" style="margin-top:10px;border-color:var(--warn)" onclick="reviewWrong()">この回の不正解だけ復習</button>`:""}
  </div>`;
}
let lastWrong=[];
function answerCollectWrong(){}
function reviewWrong(){
  const wrongIds = session.list.filter((q,idx)=>{const r=prog[q.id];return r&&r.last===false;}).map(q=>q);
  // collect wrong from this session specifically
  const list = session.list.filter(q=>{const r=prog[q.id];return r&&r.last===false;});
  if(!list.length){goHome();return;}
  document.querySelector("#quiz .card").classList.remove("hide");
  document.getElementById("quizDone").classList.add("hide");
  session={list,i:0,right:0,wrong:0}; renderQ();
}
function restartQuiz(){
  document.querySelector("#quiz .card").classList.remove("hide");
  document.getElementById("quizDone").classList.add("hide");
  startQuiz();
}

/* ---------- flashcard mode ---------- */
function startFlash(){
  const list=pool(); if(!list.length){alert("対象の問題がありません。条件を変えてください。");return;}
  session={list,i:0}; show("flash"); renderF();
}
function renderF(){
  const s=session,q=s.list[s.i];
  document.getElementById("fprog").style.width=(s.i/s.list.length*100)+"%";
  document.getElementById("fcounter").textContent=`${s.i+1} / ${s.list.length}`;
  document.getElementById("flinner").classList.remove("flip");
  document.getElementById("fmeta").innerHTML =
    `<span class="tag">${q.book}</span>`+(q.topic?`<span class="tag">${q.topic}</span>`:"")+(q.source?`<span class="tag">${q.source}</span>`:"");
  document.getElementById("ffront").textContent=q.question;
  document.getElementById("fans").className="vhead "+(q.answer?"ok":"ng");
  document.getElementById("fans").innerHTML=`${q.answer?'◯ 正しい':'✕ 誤り'} <span class="ansmark">${q.answer?'◯':'✕'}</span>`;
  document.getElementById("fexpl").innerHTML=`<span class="lab">解説</span>${q.explanation||"（解説なし）"}`;
}
function flipCard(){ document.getElementById("flinner").classList.toggle("flip"); }
function markFlash(known){
  const s=session,q=s.list[s.i],r=rec(q.id);
  r.known=known; r.seen++; save();
  s.i++;
  if(s.i>=s.list.length){ finishFlash(); return; }
  renderF();
}
function finishFlash(){
  document.getElementById("fprog").style.width="100%";
  document.querySelector("#flash .flash").classList.add("hide");
  document.querySelectorAll("#flash .row").forEach(e=>e.classList.add("hide"));
  const d=document.getElementById("flashDone"); d.classList.remove("hide");
  const knownN = session.list.filter(q=>prog[q.id]&&prog[q.id].known).length;
  d.innerHTML=`<div class="card center">
    <div style="font-size:22px;font-weight:800">カード完了</div>
    <div class="small" style="margin-top:8px">${session.list.length}枚中 ${knownN}枚を「覚えた」にしました</div>
    <div class="row" style="margin-top:18px">
      <button class="btn primary" style="flex:1" onclick="restartFlash()">もう一度</button>
      <button class="btn" style="flex:1" onclick="goHome()">ホームへ</button>
    </div></div>`;
}
function restartFlash(){
  document.querySelector("#flash .flash").classList.remove("hide");
  document.querySelectorAll("#flash .row").forEach(e=>e.classList.remove("hide"));
  document.getElementById("flashDone").classList.add("hide");
  startFlash();
}

/* ---------- progress import/export/reset ---------- */
function exportProgress(){
  const blob=new Blob([JSON.stringify(prog)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="takken_progress.json"; a.click();
}
function importProgress(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{ try{prog=JSON.parse(r.result);save();renderHome();alert("進捗を読み込みました");}catch(x){alert("読み込みに失敗しました");} };
  r.readAsText(f);
}
function resetProgress(){
  if(confirm("学習の進捗をすべて消去します。よろしいですか？")){ prog={}; save(); renderHome(); }
}

/* ---------- boot ---------- */
renderHome();
</script>
